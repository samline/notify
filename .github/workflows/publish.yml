name: Publish Package

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # Permiso id-token es vital para Provenance (generar el certificado de autoría)
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Validate version match
        run: |
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if [ "v$PACKAGE_VERSION" != "${{ github.ref_name }}" ]; then
            echo "Error: Tag ${{ github.ref_name }} no coincide con version $PACKAGE_VERSION en package.json"
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Quality Checks
        run: |
          npm run typecheck
          npm test
          npm run build

      - name: Check if version exists on npm
        id: check_exists
        run: |
          # Usamos || true para que no falle el job si la versión NO existe
          CURRENT_VER=$(node -p "require('./package.json').version")
          if npm view @samline/notify@$CURRENT_VER version >/dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Publish
        if: steps.check_exists.outputs.exists == 'false'
        # --provenance genera el link verificado entre el paquete y este repo
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
